<div class="main-content-wrapper" id="content-container">
    <!-- Content will be dynamically populated here by JavaScript -->
    <p class="text-center text-gray-500 py-8" id="loading-message">Loading content...</p>
</div>

<script>
    // Sample data simulating backend response
    const sampleData = [
        {
            sectionId: 'section-1',
            theme: 1,
            title: 'Be Scholar',
            subjects: [
                { id: 'math', name: 'Maths', url: '/maths' },
                { id: 'science', name: 'Science', url: '/science' },
                { id: 'language', name: 'Language', url: '/language' },
                { id: 'computer', name: 'Computer', url: '/computer' }
            ]
        },
        {
            sectionId: 'section-2',
            theme: 2,
            title: 'Be Social',
            subjects: [
                { id: 'family', name: 'Family', url: '/family' },
                { id: 'friends', name: 'Friends', url: '/friends' },
                { id: 'school', name: 'School', url: '/school' },
                { id: 'community', name: 'Community', url: '/community' },
                { id: 'sports', name: 'Sports', url: '/sports' }
            ]
        }
    ];

    document.addEventListener('DOMContentLoaded', () => {
        const contentContainer = document.getElementById('content-container');
        const loadingMessage = document.getElementById('loading-message');
        const cloudShapes = [
            'cloud-shape-1','cloud-shape-2','cloud-shape-3','cloud-shape-4','cloud-shape-5','cloud-shape-6','cloud-shape-7','cloud-shape-8','cloud-shape-9'
        ];

        // Simulate fetching data from a backend
        setTimeout(() => {
            loadingMessage.style.display = 'none'; // Hide loading message

            if (sampleData.length === 0) {
                contentContainer.innerHTML = '<p class="text-center text-gray-500 py-8">No content sections available.</p>';
                return;
            }

            sampleData.forEach((section, sectionIdx) => {
                // Create section container
                const sectionDiv = document.createElement('div');
                sectionDiv.classList.add('sections-subject-section-container', `section-theme-${section.theme}`);
                sectionDiv.setAttribute('data-section-id', section.sectionId);

                // Create section title
                const titleDiv = document.createElement('div');
                titleDiv.classList.add('sections-subject-section-title', `section-theme-${section.theme}`);
                titleDiv.textContent = section.title;
                sectionDiv.appendChild(titleDiv);

                // Create subjects grid
                const gridDiv = document.createElement('div');
                gridDiv.classList.add('sections-subject-grid');

                if (section.subjects && section.subjects.length > 0) {
                    section.subjects.forEach((subject, idx) => {
                        const subjectLink = document.createElement('a');
                        subjectLink.href = subject.url;
                        subjectLink.classList.add('sections-subject-item', `section-theme-${section.theme}`, 'cloud-shape');
                        subjectLink.style.clipPath = `url(#${cloudShapes[idx % cloudShapes.length]})`;
                        subjectLink.style.webkitClipPath = `url(#${cloudShapes[idx % cloudShapes.length]})`;
                        subjectLink.innerHTML = `<span>${subject.name}</span>`;
                        subjectLink.setAttribute('data-subject-id', subject.id);
                        gridDiv.appendChild(subjectLink);
                    });
                } else {
                    const noSubjectsMsg = document.createElement('p');
                    noSubjectsMsg.classList.add('text-center', 'text-gray-500', 'py-4');
                    noSubjectsMsg.textContent = 'No subjects available in this section.';
                    gridDiv.appendChild(noSubjectsMsg);
                }

                sectionDiv.appendChild(gridDiv);
                contentContainer.appendChild(sectionDiv);
            });
        }, 500); // Simulate network delay
    });
</script>
