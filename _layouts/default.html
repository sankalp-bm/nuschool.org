  <style>
    body {
      background: linear-gradient(135deg, #F0FFFF 60%, #B6E2FF 100%);
      font-family: 'Nunito', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin-bottom: 30px;
    }
    .header-bar {
      background: #2db7f6 !important;
      border-bottom-left-radius: 0rem;
      border-bottom-right-radius: 0rem;
      height: 58px;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
    }
    .header-bar .menu-btn {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .header-bar h1 {
      color: #fff;
      font-size: 1.5rem;
      font-weight: bold;
      margin: 0 auto;
    }
    .footer-fixed {
      background: #2db7f6 !important;
      border-radius: 0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
      position: fixed !important;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      min-height: 30px;
      z-index: 100;
      width: 100%;
    }
    .footer-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      font-weight: 700;
      font-size: 12.65px;
      margin: 0 0.2rem;
      text-decoration: none;
    }
    .footer-btn .material-icons {
      background: #2db7f6;
      color: #fff;
      border-radius: 50%;
      padding: 1.15rem;
      font-size: 1.1rem;
      margin-bottom: 0.1rem;
    }
    .footer-btn.active { color: #fff; }
    .footer-btn.active .material-icons {
      background: #2db7f6;
      color: #fff;
    }
    main {
      flex: 1 0 auto;
      padding-bottom: 90px;
      margin-top: 68px;
    }
  </style>

  <script>
  // Menu dropdown logic
  function toggleMenuDropdown(event) {
    event.stopPropagation();
    var dropdown = document.getElementById('menuDropdown');
    if (dropdown.style.display === 'none' || dropdown.style.display === '') {
      dropdown.style.display = 'block';
      document.addEventListener('click', closeMenuDropdown);
    } else {
      dropdown.style.display = 'none';
      document.removeEventListener('click', closeMenuDropdown);
    }
  }
  function closeMenuDropdown(e) {
    var dropdown = document.getElementById('menuDropdown');
    if (!dropdown.contains(e.target)) {
      dropdown.style.display = 'none';
      document.removeEventListener('click', closeMenuDropdown);
    }
  }
  </script>

  <script>
  // Slider bullet navigation functionality
  document.addEventListener('DOMContentLoaded', function() {
    const slides = document.querySelectorAll('.slider-slide');
    const bullets = document.querySelectorAll('.slider-bullet');
    const wrapper = document.getElementById('sliderWrapper');
    if (!slides.length || !bullets.length || !wrapper) return;
    bullets.forEach((bullet, idx) => {
      bullet.addEventListener('click', () => {
        wrapper.style.transform = `translateX(-${idx * 100}%)`;
        bullets.forEach(b => b.classList.remove('active'));
        bullet.classList.add('active');
      });
    });
  });
  </script>
</body>
